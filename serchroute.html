<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>経路検索アプリ</title>
    <!-- ★ geometry を追加 -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB_Tmq8Qn3F269Jx1ehDA7xcpWFHTxRoBQ&libraries=places,geometry"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; }
        h1 { margin: 8px 10px; font-size: 1.1rem; }

        #controls {
            margin: 6px 10px;
        }
        input {
            margin: 3px;
            padding: 5px;
            width: 300px;
        }
        button {
            font-size: 75%;
            margin: 2px;
            padding: 3px 6px;
            background: #cbe8fa;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.4;
            cursor: default;
        }

        /* ★ route-info は container の外に1か所だけ */
        #route-info {
            margin: 6px 10px;
            padding: 8px;
            border: 1px solid #ccc;
            font-size: 75%;
        }
        #waypoints-view {
            list-style: none;
            margin: 2px 0 0 0;
            padding: 0;
        }
        #waypoints-empty {
            color: #888;
        }

        #container {
            position: relative;
            width: 100%;
            height: 600px;
        }
        #map {
            width: 40%;
            height: 100%;
            float: left;
        }
        #street-view {
            width: 60%;
            height: 100%;
            float: left;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <h1>経路検索アプリ</h1>

    <div id="controls">
        <input id="location-input" type="text" placeholder="地点を検索">
        <button id="search-location">検索</button>
        <!-- ★ id を JS と一致させる -->
        <button id="random-world-route">世界ランダム</button>
        <br>
        <button id="set-start">起点に設定</button>
        <button id="add-waypoint">経由地に追加</button>
        <button id="set-end">終点に設定</button>
        <button id="search-route" disabled>経路を検索</button>
        <button id="start-streetview" disabled>ストリートビュー開始</button>
        <br>
        <button id="clear-waypoints">経由地クリア</button>
        <button id="swap-locations" disabled>起点と終点を入れ替え</button>
        <button id="stop-streetview">ストリートビュー停止</button>
        <button id="resume-streetview">ストリートビュー再開</button>
    </div>

    <!-- ★ route-info は container の外に1か所だけ -->
    <div id="route-info">
        <div><strong>起点：</strong><span id="start-view">未設定</span></div>
        <div>
            <strong>経由地：</strong>
            <span id="waypoints-empty">なし</span>
            <ul id="waypoints-view"></ul>
        </div>
        <div><strong>終点：</strong><span id="end-view">未設定</span></div>
    </div>

    <!-- ★ container 内の重複 div を削除 -->
    <div id="container">
        <div id="map"></div>
        <div id="street-view"></div>
    </div>

    <script src="app.js"></script>

    
    <br>
    <a href="https://ig.me/m/chochoporice">お問い合わせはこちら</a>
    <br><br><br><br>

<footer style="font-size:11px; color:#888; text-align:center; padding:8px;">
  © 2025 Toshiyuki Oosawa - 無断複製・商用利用禁止
</footer>
</body>
</html>
